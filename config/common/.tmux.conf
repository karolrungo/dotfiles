set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on' # enable tmux-continuum functionality


set -g default-terminal "screen-256color"
setw -g mouse on

# From tmux-sensible (replacing the plugin)
set-option -g set-titles off
set-option -g allow-rename off

set -s escape-time 0
set -g focus-events on
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

unbind-key C-b
set-option -g prefix C-a
bind C-a send-prefix

# Easily reorder windows with CTRL+SHIFT+Arrow
bind -n C-S-Left swap-window -d -t -1
bind -n C-S-Right swap-window -d -t +1

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Set the base-index to 1 rather than 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Allow the arrow key to be used immediately after changing windows.
set-option -g repeat-time 0

# Lengthen the amount of time status messages are displayed
set-option -g display-time 3000
set-option -g display-panes-time 3000

# Open new pane / windows in a current directory
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# set vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

set-option -g history-limit 10000

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_date_time_text "%d/%m %H:%M"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_application} #{E:@catppuccin_status_date_time}"

run-shell ~/.tmux/plugins/tpm/tpm

# Auto-rename windows to current command (e.g. k9s, nvim) but never hostname
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format '#{pane_current_command}'


